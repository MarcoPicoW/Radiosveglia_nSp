[global]

#--------#
# DEVICE #
#--------#

# Name shown in Spotify Connect. Must match device_name in radiosveglia.conf.
device_name = "Radiosveglia"
device_type = "speaker"

#------#
# DBUS #
#------#

# Required for MPRIS / playerctl. Works with loginctl linger + user service.
use_mpris = true
dbus_type = "session"

#-----------#
# DISCOVERY #
#-----------#

# Zeroconf discovery: required for the device to appear in Spotify Connect.
disable_discovery = false

#-------#
# AUDIO #
#-------#

# ALSA backend (I2S MAX98357A via hifiberry-dac overlay).
backend = "alsa"

# Direct hardware address of the hifiberry-dac card.
# Using hw:0,0 avoids conflicts with virtual ALSA devices.
device = "hw:0,0"

# PCM format. S16 is the most compatible with the MAX98357A.
# If you get "snd_pcm_hw_params_set_format ... EINVAL", try S32.
audio_format = "S16"

# Software volume controller (the MAX98357A has no hardware mixer).
volume_controller = "softvol"

# Spotify stream bitrate: 96 / 160 / 320
bitrate = 320

# Initial volume 0-100.
initial_volume = 70

# Volume normalisation between tracks.
volume_normalisation = true
normalisation_pregain = -10

#-------#
# OTHER #
#-------#

# Continue with similar tracks at end of playlist.
autoplay = true
