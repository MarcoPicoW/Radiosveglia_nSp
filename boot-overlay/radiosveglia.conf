# =============================================================================
#  Radiosveglia_nSp — User configuration
# =============================================================================
#
#  Edit this file to customize your alarm. Changes take effect on the next boot.
#
#  Where this file lives:
#    /boot/firmware/radiosveglia.conf  (visible as a removable drive on
#                                       Windows/macOS when the SD is plugged in)
#
#  After editing, either:
#    a) eject the SD and put it back in the Pi, or
#    b) reboot the Pi if it's running:    sudo reboot
#
#  Syntax:
#    - Lines starting with '#' are comments (ignored).
#    - Empty values disable the corresponding feature (e.g. an empty alarm day
#      means "no alarm on that day").
#    - Times use 24-hour HH:MM format (no seconds, no AM/PM).
# =============================================================================


# -----------------------------------------------------------------------------
# [alarm] — when the alarm should ring
# -----------------------------------------------------------------------------
# One line per day of the week. Format: HH:MM (24-hour).
# Leave the value empty (or comment out the line) to skip the alarm that day.
#
# Examples:
#   monday    = 06:30        # alarm at 6:30 AM
#   saturday  =              # no alarm on Saturday
#   #sunday   = 08:00        # commented out, also no alarm
# -----------------------------------------------------------------------------

[alarm]
monday    = 06:30
tuesday   = 06:30
wednesday = 06:30
thursday  = 06:30
friday    = 06:30
saturday  = 10:00
sunday    = 08:00

# Target playback volume (0-100).
# Note: the alarm always starts at volume 0 and ramps up to this value after
# 3 seconds, to mask the "click" of the I2S amplifier on activation.
volume = 50


# -----------------------------------------------------------------------------
# [spotify] — what to play and where
# -----------------------------------------------------------------------------

[spotify]

# Spotify Show ID — the latest episode of this podcast will be played.
#
# How to find it:
#   1. Open Spotify, find the show you want.
#   2. Right-click → Share → Copy link to show.
#   3. The URL looks like: https://open.spotify.com/show/16dmTJvMre4YDTUYpuJtuZ
#   4. The ID is the last segment after /show/
show_id = 16dmTJvMre4YDTUYpuJtuZ

# ISO country code, used to fetch the correct podcast catalog.
# Common values: CH, IT, DE, FR, GB, US, AT, ES.
market = CH

# Name of the Spotify Connect device exposed by spotifyd.
# Must match the device_name in spotifyd.conf — usually no need to change this.
device_name = Radiosveglia
